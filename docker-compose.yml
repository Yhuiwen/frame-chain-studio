services:
  migrate:
    build:
      context: ./backend
    command: ["python", "-m", "alembic", "upgrade", "head"]
    environment:
      FCS_DATABASE_URL: sqlite:///./data/frame_chain.db
      FCS_STORAGE_DIR: ./data/storage
      FCS_FIXTURE_DIR: ./tests/fixtures
    volumes:
      - backend-data:/app/data

  fake-provider:
    build:
      context: ./backend
    command: ["python", "-m", "uvicorn", "fake_provider.app:app", "--host", "0.0.0.0", "--port", "8090"]
    profiles:
      - development
      - worker
    ports:
      - "8090:8090"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/fake/v1/ready', timeout=2).read()"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      FCS_DATABASE_URL: sqlite:///./data/frame_chain.db
      FCS_STORAGE_DIR: ./data/storage
      FCS_FIXTURE_DIR: ./tests/fixtures
      FCS_CORS_ORIGINS: '["http://localhost:5173"]'
      FCS_DEFAULT_IMAGE_PROVIDER_ID: mock
      FCS_DEFAULT_VIDEO_PROVIDER_ID: mock
      FCS_PROVIDER_CONFIG_FILE: provider-config.docker.json
    ports:
      - "8000:8000"
    volumes:
      - backend-data:/app/data
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/ready', timeout=2).read()"]
      interval: 10s
      timeout: 3s
      retries: 5

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: ""
      VITE_API_PROXY_TARGET: http://backend:8000
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5173').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 5

  generation-worker:
    build:
      context: ./backend
    command: ["python", "-m", "app.workers.cli"]
    profiles:
      - worker
    environment:
      FCS_DATABASE_URL: sqlite:///./data/frame_chain.db
      FCS_STORAGE_DIR: ./data/storage
      FCS_FIXTURE_DIR: ./tests/fixtures
      FCS_PROVIDER_CONFIG_FILE: provider-config.docker.json
      FCS_WORKER_ID: compose-generation-worker
      FCS_WORKER_HEARTBEAT_SECONDS: 10
      FCS_WORKER_STALE_AFTER_SECONDS: 45
    volumes:
      - backend-data:/app/data
    depends_on:
      migrate:
        condition: service_completed_successfully
      fake-provider:
        condition: service_healthy

  result-worker:
    build:
      context: ./backend
    command: ["python", "-m", "app.workers.result_cli"]
    profiles:
      - worker
    environment:
      FCS_DATABASE_URL: sqlite:///./data/frame_chain.db
      FCS_STORAGE_DIR: ./data/storage
      FCS_FIXTURE_DIR: ./tests/fixtures
      FCS_ENV: development
      FCS_RESULT_ALLOWED_PRIVATE_HOSTS: fake-provider,127.0.0.1
      FCS_WORKER_ID: compose-result-worker
      FCS_WORKER_HEARTBEAT_SECONDS: 10
      FCS_WORKER_STALE_AFTER_SECONDS: 45
    volumes:
      - backend-data:/app/data
    depends_on:
      migrate:
        condition: service_completed_successfully
      fake-provider:
        condition: service_healthy

  render-worker:
    build:
      context: ./backend
    command: ["python", "-m", "app.workers.render_cli"]
    profiles:
      - worker
    environment:
      FCS_DATABASE_URL: sqlite:///./data/frame_chain.db
      FCS_STORAGE_DIR: ./data/storage
      FCS_FIXTURE_DIR: ./tests/fixtures
      FCS_WORKER_ID: compose-render-worker
      FCS_WORKER_HEARTBEAT_SECONDS: 10
      FCS_WORKER_STALE_AFTER_SECONDS: 45
    volumes:
      - backend-data:/app/data
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  backend-data:

services:
  backend:
    build:
      context: ./backend
    environment:
      FCS_DATABASE_URL: sqlite:///./data/frame_chain.db
      FCS_STORAGE_DIR: ./data/storage
      FCS_FIXTURE_DIR: ./assets/fixtures
      FCS_CORS_ORIGINS: '["http://localhost:5173"]'
    ports:
      - "8000:8000"
    volumes:
      - backend-data:/app/data

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: ""
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  backend-data:
